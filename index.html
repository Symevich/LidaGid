<!doctype html>
<html lang="be">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Інтэрактыўны аўдыёгід па Лідзе: славутасці, прадпрыемствы і вядомыя людзі ў адным зручным месцы." />
    <title>Аўдыёгід па горадзе Ліда</title>

    <!--
      Fix #6: set the correct language on <html> immediately, before any render,
      so screen readers and search engines see the right lang on first load.
      Wrapped in try/catch because localStorage can throw in private mode.
    -->
    <script>
      try { document.documentElement.lang = localStorage.getItem('lidagid_lang') || 'be'; } catch (e) {}
    </script>

    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
  </head>
  <body>

    <!-- Fix #15: visible fallback for users with JS disabled -->
    <noscript>
      <div class="noscript-msg">
        Для работы аўдыёгіда неабходна ўключыць JavaScript у браўзеры.<br />
        Для работы аудиогида необходимо включить JavaScript в браузере.<br />
        JavaScript is required to use this audio guide. Please enable it in your browser settings.
      </div>
    </noscript>

    <!--
      #app is the single root for all view content.
      aria-live="polite" announces route changes to screen readers.
    -->
    <main id="app" aria-live="polite" aria-atomic="false"></main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./js/i18n.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
